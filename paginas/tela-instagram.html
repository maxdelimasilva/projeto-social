<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    ::-webkit-scrollbar{
        width: 0px;
    }

    body{
        width: 100vw;
        height: 100vh;

        overflow-y: auto;
        overflow-x: hidden;
    }

    img{    
        width: 100%;
        object-fit: cover;
        display: block;
    }

    a{
        display: block;
        padding:40px;
        background-color: rgb(18, 18, 87);
        text-align: center;
        text-decoration: none;
        font-size: 30px;
        color: aliceblue;
    }
    
    a:hover{
        background-color: rgba(20, 20, 128);
        transform: transition(0.3s);
    }
</style>
<body>
     <img src="../assets/imagens/tela-instagram.jpg">
     <a href="">Acesse</a>  
</body>
</html>
